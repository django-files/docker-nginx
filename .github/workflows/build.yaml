name: "Build"

on:
  push:
    branches: [master]
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tags:
        description: "Override Tags: comma,separated"
        required: false

env:
  REGISTRY: "ghcr.io"
  USER: "django-files"
  REPO: "docker-nginx"

jobs:
  build:
    name: "Build"
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read
      packages: write

    steps:
      - name: "Checkout"
        uses: actions/checkout@v4

      - name: "Docker Tags"
        id: tags
        uses: cssnr/docker-tags-action@v1
        continue-on-error: true
        with:
          tags: ${{ inputs.tags }}

      - name: "Setup Buildx"
        uses: docker/setup-buildx-action@v3
        with:
          platforms: linux/amd64,linux/arm64

      - name: "Docker Login"
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: "Build and Push"
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.tags.outputs.tags || format('{0}/{1}/{2}:latest', env.REGISTRY, env.USER, env.REPO) }}
          labels: ${{ steps.tags.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
